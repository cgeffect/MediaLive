; ZLMediaKit minimal config for local preview
[api]
apiDebug=1
secret=codex_local_secret

[general]
flowThreshold=1024
maxStreamWaitMS=15000
streamNoneReaderDelayMS=15000

[http]
port=8081
sslport=8443
dir=./www
forbidCacheSuffix=
forwarded_ip_header=
keepAliveSecond=30
charSet=utf-8

[rtmp]
port=1935
sslport=19350

[rtc]
port=8000

[hook]
enable=0

[shell]
port=9000
